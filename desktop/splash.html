<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>AEGIS</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #05070a;
        color: #e7ecf3;
        font-family: ui-monospace, "SFMono-Regular", monospace;
        overflow: hidden;
        user-select: none;
        -webkit-app-region: drag;
      }
      .frame {
        position: relative;
        height: 100%;
        display: grid;
        place-items: center;
        background:
          radial-gradient(80% 60% at 50% -10%, rgba(16, 245, 168, 0.1), transparent 60%),
          radial-gradient(60% 60% at 100% 100%, rgba(20, 60, 120, 0.18), transparent 60%);
      }
      .grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(to right, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
        background-size: 32px 32px;
      }
      .vignette {
        position: absolute;
        inset: 0;
        background: radial-gradient(120% 80% at 50% 50%, transparent 30%, rgba(0, 0, 0, 0.7) 100%);
      }
      .center {
        position: relative;
        text-align: center;
      }
      .title {
        font-family: "Orbitron", "Inter", sans-serif;
        font-weight: 700;
        font-size: 28px;
        letter-spacing: 12px;
        color: #10f5a8;
        text-shadow: 0 0 16px rgba(16, 245, 168, 0.45);
        margin-bottom: 6px;
      }
      .sub {
        font-size: 10px;
        letter-spacing: 4px;
        color: rgba(255, 255, 255, 0.45);
        text-transform: uppercase;
        margin-bottom: 28px;
      }
      .bar {
        position: relative;
        width: 240px;
        height: 4px;
        margin: 0 auto;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 4px;
        overflow: hidden;
      }
      .bar::before {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        width: 30%;
        background: linear-gradient(
          90deg,
          transparent,
          #10f5a8 50%,
          transparent
        );
        animation: slide 1.4s linear infinite;
      }
      @keyframes slide {
        0% {
          left: -30%;
        }
        100% {
          left: 100%;
        }
      }
      .footer {
        position: absolute;
        bottom: 12px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 9px;
        letter-spacing: 4px;
        color: rgba(255, 255, 255, 0.3);
        text-transform: uppercase;
      }
      .corner {
        position: absolute;
        width: 18px;
        height: 18px;
        color: rgba(16, 245, 168, 0.6);
      }
      .tl { top: 12px; left: 12px; }
      .tr { top: 12px; right: 12px; transform: rotate(90deg); }
      .bl { bottom: 12px; left: 12px; transform: rotate(-90deg); }
      .br { bottom: 12px; right: 12px; transform: rotate(180deg); }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="grid"></div>
      <div class="vignette"></div>
      <svg class="corner tl" viewBox="0 0 18 18">
        <path d="M2 2H10M2 2V10" stroke="currentColor" stroke-width="1.4" stroke-linecap="square" />
      </svg>
      <svg class="corner tr" viewBox="0 0 18 18">
        <path d="M2 2H10M2 2V10" stroke="currentColor" stroke-width="1.4" stroke-linecap="square" />
      </svg>
      <svg class="corner bl" viewBox="0 0 18 18">
        <path d="M2 2H10M2 2V10" stroke="currentColor" stroke-width="1.4" stroke-linecap="square" />
      </svg>
      <svg class="corner br" viewBox="0 0 18 18">
        <path d="M2 2H10M2 2V10" stroke="currentColor" stroke-width="1.4" stroke-linecap="square" />
      </svg>
      <div class="center">
        <div class="title">AEGIS</div>
        <div class="sub">SECURE TERMINAL · INITIALIZING</div>
        <div class="bar"></div>
      </div>
      <div class="footer">CLASSIFIED · TLS-1.3 · NO LOOK</div>
    </div>
  </body>
</html>
