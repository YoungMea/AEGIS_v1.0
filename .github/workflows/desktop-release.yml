name: Desktop release

# Build the Electron desktop client for Windows and Linux on every release
# tag (e.g. v1.0.0-beta.1) and attach the artefacts to the matching
# GitHub Release. Manual runs via the "workflow_dispatch" entry are
# supported for testing without cutting a tag.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
            ext: exe
          - os: ubuntu-latest
            target: linux
            ext: AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Print versions early so failures surface useful context.
      - name: Show versions
        shell: bash
        run: |
          node --version
          npm --version
          ls desktop

      - name: Install dependencies
        working-directory: desktop
        shell: bash
        run: |
          npm install --no-audit --no-fund --loglevel=warn

      - name: Build for ${{ matrix.target }}
        working-directory: desktop
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USE_HARD_LINKS: "false"
          # Skip the macOS entry in electron-builder.yml on this matrix.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          npm run build:${{ matrix.target }}

      - name: List build output
        working-directory: desktop
        shell: bash
        run: |
          ls -la dist || true

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: aegis-${{ matrix.target }}
          path: |
            desktop/dist/*.exe
            desktop/dist/*.AppImage
            desktop/dist/*.deb
          if-no-files-found: warn

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: artefacts

      - name: List downloaded artefacts
        run: find artefacts -type f -printf '%p (%s bytes)\n' || true

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artefacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
